<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="image/logo.png"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Salo sa Antipolo — Waiter Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,600;1,400;1,600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="waiter-login.css">
</head>
<body>
<div class="bg"></div>
<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<div class="page">
  <div class="card">
    <div class="card-strip"></div>
    <div class="card-header">
      <div class="role-badge"><span></span>Waiter Portal</div>
      <h1 class="card-title">Ready to<br><em>serve?</em></h1>
      <p class="card-subtitle">Sign in to start taking orders</p>
    </div>
    <div class="card-body">
      <div class="error-msg" id="errorMsg"><span>⚠</span><span id="errorText">Invalid credentials.</span></div>
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="your@email.com" autocomplete="email"/>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrap">
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
          <button class="toggle-pw" id="togglePw" type="button">👁</button>
        </div>
      </div>
      <button class="btn-login" id="loginBtn">
        <span class="btn-text">Sign In as Waiter</span>
        <div class="btn-spinner"></div>
      </button>

      <!-- Registration link -->
      <div style="margin-top:16px;text-align:center;">
        <span style="font-size:12px;color:#3a3a3a;">New to the team? </span>
        <a href="waiter-register.html" style="font-size:12px;font-weight:600;color:var(--gold);text-decoration:none;transition:color 0.2s;" onmouseover="this.style.color='#e8c07a'" onmouseout="this.style.color='#c9973a'">Create an account →</a>
      </div>

      <div class="card-footer">
        <span class="footer-text">Salo sa Antipolo © 2025</span>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"><div class="toast-dot"></div><span id="toastMsg">Signing you in…</span></div>

<script type="module" src="waiter-login.js"></script>
</body>
</html>
