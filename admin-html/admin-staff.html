<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" type="image/png" href="../image/logo.png"/>
  <title>Salo sa Antipolo — Staff</title>
  <link rel="stylesheet" href="../admin.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
  <div class="bg"></div>
  <div class="bg-dots"></div>
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <!-- ── Sidebar ── -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon"><img src="../image/logo.png" alt="Salo sa Antipolo Logo" class="brand-logo-img"/></div>
      <div class="brand-text">
        <span class="brand-name">Salo sa</span>
        <em class="brand-italic">Antipolo</em>
      </div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section-label">Main</div>
      <a href="admin-overview.html" class="nav-item" data-view="overview">
        <span class="nav-icon"><i data-lucide="layout-dashboard"></i></span><span class="nav-label">Overview</span>
      </a>
      <a href="admin-orders.html" class="nav-item" data-view="orders">
        <span class="nav-icon"><i data-lucide="clipboard-list"></i></span><span class="nav-label">Live Orders</span>
        <span class="nav-badge" id="ordersBadge">0</span>
      </a>
      <a href="admin-tables.html" class="nav-item" data-view="tables">
        <span class="nav-icon"><i data-lucide="armchair"></i></span><span class="nav-label">Tables</span>
      </a>
      <a href="admin-menu.html" class="nav-item" data-view="menu">
        <span class="nav-icon"><i data-lucide="utensils"></i></span><span class="nav-label">Menu</span>
      </a>

      <div class="nav-section-label">Management</div>
      <a href="admin-billing.html" class="nav-item" data-view="billing">
        <span class="nav-icon"><i data-lucide="banknote"></i></span><span class="nav-label">Billing</span>
      </a>
      <a href="admin-staff.html" class="nav-item active" data-view="staff">
        <span class="nav-icon"><i data-lucide="users"></i></span><span class="nav-label">Staff</span>
        <span class="nav-badge" id="staffBadge" style="display:none">0</span>
      </a>
      <a href="admin-reports.html" class="nav-item" data-view="reports">
        <span class="nav-icon"><i data-lucide="trending-up"></i></span><span class="nav-label">Reports</span>
      </a>
    </nav>

    <div class="sidebar-user">
      <div class="user-avatar" id="userAvatarSidebar">A</div>
      <div class="user-info">
        <span class="user-name" id="userNameSidebar">Admin</span>
        <span class="user-role">Administrator</span>
      </div>
      <button class="logout-btn" id="logoutBtn" title="Logout"><i data-lucide="log-out"></i></button>
    </div>
  </aside>

  <div class="overlay" id="overlay"></div>

  <!-- ── Main ── -->
  <div class="main" id="main">
    <header class="topbar">
      <button class="hamburger" id="hamburger">☰</button>
      <div class="topbar-left">
        <h1 class="page-title" id="pageTitle">Staff</h1>
        <span class="page-date" id="pageDate"></span>
      </div>
      <div class="topbar-right">
        <div class="live-indicator"><span class="live-dot"></span>Live</div>
        <div class="topbar-user">
          <span id="topbarName">Admin</span>
          <div class="user-avatar sm" id="userAvatarTop">A</div>
        </div>
      </div>
    </header>

    <div class="view active">
      <div class="view-toolbar">
        <div class="panel-title panel-title--small">Staff Accounts</div>
      </div>
      <div class="staff-grid" id="staffGrid">
        <div class="empty-state">Loading staff…</div>
      </div>
    </div>
  </div>

  <!-- ── Toast ── -->
  <div class="toast" id="toast"><div class="toast-dot"></div><span id="toastMsg">Done.</span></div>

  <!-- ── Confirmation Modal ── -->
  <div class="confirm-modal-overlay" id="confirmModal">
    <div class="confirm-modal" role="dialog" aria-modal="true" aria-labelledby="confirmTitle">
      <div class="confirm-modal-head">
        <div class="confirm-modal-icon-wrap" id="confirmIconWrap">
          <span id="confirmIcon">⚠️</span>
        </div>
        <button class="confirm-modal-close" id="confirmModalClose" aria-label="Close">✕</button>
      </div>
      <div class="confirm-modal-body">
        <div class="confirm-modal-title" id="confirmTitle">Confirm Action</div>
        <div class="confirm-modal-message" id="confirmMessage">Are you sure?</div>
      </div>
      <div class="confirm-modal-foot">
        <button class="btn-sm" id="confirmCancel">Cancel</button>
        <button class="btn-sm gold" id="confirmOk">Confirm</button>
      </div>
    </div>
  </div>

  <script type="module" src="../admin-js/admin-staff.js"></script>
  <script>document.addEventListener("DOMContentLoaded",()=>{ if(window.lucide) lucide.createIcons(); });</script>
</body>
</html>
