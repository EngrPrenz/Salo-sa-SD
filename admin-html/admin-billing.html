<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" type="image/png" href="../image/logo.png"/>
  <title>Salo sa Antipolo — Billing</title>
  <link rel="stylesheet" href="../admin.css">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    /* ── Billing summary bar ── */
    .billing-summary {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      padding: 10px 18px;
      background: var(--black-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      flex-shrink: 0;
    }
    .billing-summary-label {
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--text-muted);
    }
    .billing-summary-value {
      font-family: 'Cormorant Garamond', serif;
      font-size: 26px; font-weight: 600;
      color: var(--gold-light);
      line-height: 1;
    }

    /* ── Billing table wrapper ── */
    .billing-table-wrap {
      background: var(--black-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }
    .billing-scroll {
      overflow-x: auto;
      overflow-y: auto;
      flex: 1;
    }
    .billing-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      min-width: 560px;
    }
    .billing-table th {
      padding: 12px 16px;
      text-align: left;
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      background: var(--black-mid);
      white-space: nowrap;
      position: sticky; top: 0; z-index: 2;
    }
    .billing-table td {
      padding: 13px 16px;
      border-bottom: 1px solid rgba(42,42,42,0.6);
      vertical-align: middle;
      transition: background 0.1s;
    }
    .billing-table tbody tr:last-child td { border-bottom: none; }
    .billing-table tbody tr:hover td { background: rgba(201,151,58,0.04); }

    /* ── Responsive column hiding ── */
    @media (max-width: 700px) {
      .col-waiter { display: none; }
    }
    @media (max-width: 560px) {
      .col-items  { display: none; }
      .col-date   { display: none; }
      .billing-summary-value { font-size: 20px; }
    }
    @media (max-width: 400px) {
      .billing-table th,
      .billing-table td { padding: 10px 10px; font-size: 12px; }
    }

    /* ── Receipt modal ── */
    .receipt-modal {
      position: fixed; inset: 0; z-index: 500;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      display: none; align-items: center; justify-content: center;
      padding: 20px;
    }
    .receipt-modal.show { display: flex; }
    .receipt-modal-box {
      background: var(--black-card);
      border: 1px solid var(--border);
      border-radius: 18px;
      width: 100%; max-width: 440px;
      max-height: 88vh; overflow-y: auto;
      animation: modalIn 0.25s cubic-bezier(0.16,1,0.3,1);
      position: relative; z-index: 1;
    }
    @keyframes modalIn { from{opacity:0;transform:scale(0.95) translateY(10px)} to{opacity:1;transform:none} }
    .receipt-modal-head {
      padding: 20px 22px 16px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .receipt-modal-title {
      font-size: 15px; font-weight: 600; color: var(--white);
      display: flex; align-items: center; gap: 9px;
    }
    .receipt-modal-body {
      padding: 20px 22px;
      font-size: 13px; color: var(--off-white);
      line-height: 1.6;
    }
    .receipt-modal-foot {
      padding: 12px 22px 18px;
      border-top: 1px solid var(--border);
      display: flex; justify-content: flex-end; gap: 10px;
    }
    .receipt-modal-foot .btn-sm { padding: 9px 20px; font-size: 13px; border-radius: 9px; }
    .receipt-modal-foot .btn-sm.gold { background: var(--gold-dim); border-color: rgba(201,151,58,0.4); color: var(--gold); }
    .receipt-modal-foot .btn-sm.gold:hover { background: var(--gold); color: var(--black); }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="bg-dots"></div>
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon"><img src="../image/logo.png" alt="Salo sa Antipolo Logo" class="brand-logo-img"/></div>
      <div class="brand-text">
        <span class="brand-name">Salo sa</span>
        <em class="brand-italic">Antipolo</em>
      </div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section-label">Main</div>
      <a href="admin-overview.html" class="nav-item" data-view="overview">
        <span class="nav-icon"><i data-lucide="layout-dashboard"></i></span><span class="nav-label">Overview</span>
      </a>
      <a href="admin-orders.html" class="nav-item" data-view="orders">
        <span class="nav-icon"><i data-lucide="clipboard-list"></i></span><span class="nav-label">Live Orders</span>
        <span class="nav-badge" id="ordersBadge">0</span>
      </a>
      <a href="admin-tables.html" class="nav-item" data-view="tables">
        <span class="nav-icon"><i data-lucide="armchair"></i></span><span class="nav-label">Tables</span>
      </a>
      <a href="admin-menu.html" class="nav-item" data-view="menu">
        <span class="nav-icon"><i data-lucide="utensils"></i></span><span class="nav-label">Menu</span>
      </a>

      <div class="nav-section-label">Management</div>
      <a href="admin-billing.html" class="nav-item active" data-view="billing">
        <span class="nav-icon"><i data-lucide="banknote"></i></span><span class="nav-label">Billing</span>
      </a>
      <a href="admin-staff.html" class="nav-item" data-view="staff">
        <span class="nav-icon"><i data-lucide="users"></i></span><span class="nav-label">Staff</span>
      </a>
      <a href="admin-reports.html" class="nav-item" data-view="reports">
        <span class="nav-icon"><i data-lucide="trending-up"></i></span><span class="nav-label">Reports</span>
      </a>
    </nav>

    <div class="sidebar-user">
      <div class="user-avatar" id="userAvatarSidebar">A</div>
      <div class="user-info">
        <span class="user-name" id="userNameSidebar">Admin</span>
        <span class="user-role">Administrator</span>
      </div>
      <button class="logout-btn" id="logoutBtn" title="Logout"><i data-lucide="log-out"></i></button>
    </div>
  </aside>

  <div class="overlay" id="overlay"></div>

  <div class="main" id="main">
    <header class="topbar">
      <button class="hamburger" id="hamburger">☰</button>
      <div class="topbar-left">
        <h1 class="page-title" id="pageTitle">Billing</h1>
        <span class="page-date" id="pageDate"></span>
      </div>
      <div class="topbar-right">
        <div class="live-indicator"><span class="live-dot"></span>Live</div>
        <div class="topbar-user">
          <span id="topbarName">Admin</span>
          <div class="user-avatar sm" id="userAvatarTop">A</div>
        </div>
      </div>
    </header>

    <div class="view active">

      <!-- Today's Total -->
      <div class="billing-summary">
        <span class="billing-summary-label">Today's Total</span>
        <span class="billing-summary-value" id="billingTodayTotal">₱0.00</span>
      </div>

      <!-- Billing Table -->
      <div class="billing-table-wrap">
        <div class="billing-scroll">
          <table class="billing-table">
            <thead>
              <tr>
                <th>Order ID</th>
                <th>Table</th>
                <th class="col-waiter">Waiter</th>
                <th class="col-items">Items</th>
                <th>Total</th>
                <th class="col-date">Date/Time</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="billingTableBody">
              <tr><td colspan="8" class="empty-row">Loading billing records…</td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </div>

  <div class="toast" id="toast"><div class="toast-dot"></div><span id="toastMsg">Done.</span></div>

  <!-- ── Receipt Modal ── -->
  <div class="receipt-modal" id="receiptModal">
    <div class="receipt-modal-box">
      <div class="receipt-modal-head">
        <span class="receipt-modal-title">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--gold)"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
          Receipt
        </span>
        <button class="modal-close" id="receiptModalClose">✕</button>
      </div>
      <div class="receipt-modal-body" id="receiptModalBody"></div>
      <div class="receipt-modal-foot">
        <button class="btn-sm" id="receiptModalClose2">Close</button>
        <button class="btn-sm gold" id="receiptModalPrint">
          <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
          Print
        </button>
      </div>
    </div>
  </div>

  <script type="module" src="../admin-js/admin-billing.js"></script>
  <script>document.addEventListener("DOMContentLoaded", () => { if (window.lucide) lucide.createIcons(); });</script>
</body>
</html>
