<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="refresh" content="0;url=../admin.html#tables" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Redirecting...</title>
</head>
<body><script>window.location.href='../admin.html#tables';</script></body>
</html>

<div class="bg"></div>
<div class="bg-dots"></div>
<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <div class="brand-icon"><img src="../image/logo.png" alt="Salo sa Antipolo Logo" class="brand-logo-img"/></div>
    <div class="brand-text">
      <span class="brand-name">Salo sa</span>
      <em class="brand-italic">Antipolo</em>
    </div>
  </div>

  <nav class="sidebar-nav">
    <div class="nav-section-label">Main</div>
    <a href="admin-overview.html" class="nav-item" data-view="overview">
      <span class="nav-icon"><i data-lucide="layout-dashboard"></i></span><span class="nav-label">Overview</span>
    </a>
    <a href="admin-orders.html" class="nav-item" data-view="orders">
      <span class="nav-icon"><i data-lucide="clipboard-list"></i></span><span class="nav-label">Live Orders</span>
      <span class="nav-badge" id="ordersBadge">0</span>
    </a>
    <a href="admin-tables.html" class="nav-item active" data-view="tables">
      <span class="nav-icon"><i data-lucide="armchair"></i></span><span class="nav-label">Tables</span>
    </a>
    <a href="admin-menu.html" class="nav-item" data-view="menu">
      <span class="nav-icon"><i data-lucide="utensils"></i></span><span class="nav-label">Menu</span>
    </a>

    <div class="nav-section-label">Management</div>
    <a href="admin-billing.html" class="nav-item" data-view="billing">
      <span class="nav-icon"><i data-lucide="banknote"></i></span><span class="nav-label">Billing</span>
    </a>
    <a href="admin-staff.html" class="nav-item" data-view="staff">
      <span class="nav-icon"><i data-lucide="users"></i></span><span class="nav-label">Staff</span>
    </a>
    <a href="admin-reports.html" class="nav-item" data-view="reports">
      <span class="nav-icon"><i data-lucide="trending-up"></i></span><span class="nav-label">Reports</span>
    </a>
  </nav>

  <div class="sidebar-user">
    <div class="user-avatar" id="userAvatarSidebar">A</div>
    <div class="user-info">
      <span class="user-name" id="userNameSidebar">Admin</span>
      <span class="user-role">Administrator</span>
    </div>
    <button class="logout-btn" id="logoutBtn" title="Logout"><i data-lucide="log-out"></i></button>
  </div>
</aside>

<div class="overlay" id="overlay"></div>

<div class="main" id="main">
  <header class="topbar">
    <button class="hamburger" id="hamburger">☰</button>
    <div class="topbar-left">
      <h1 class="page-title" id="pageTitle">Tables</h1>
      <span class="page-date" id="pageDate"></span>
    </div>
    <div class="topbar-right">
      <div class="live-indicator"><span class="live-dot"></span>Live</div>
      <div class="topbar-user">
        <span id="topbarName">Admin</span>
        <div class="user-avatar sm" id="userAvatarTop">A</div>
      </div>
    </div>
  </header>

  <div class="view active">
    <div class="view-toolbar">
      <div class="panel-title panel-title--small" id="tablesToolbarTitle">Loading tables…</div>
      <div class="toolbar-right">
        <button class="btn-sm gold" id="clearAllTablesBtn">Clear All Tables</button>
      </div>
    </div>
    <div class="tables-large-grid" id="tablesGrid"></div>
  </div>
</div>

<div class="toast" id="toast"><div class="toast-dot"></div><span id="toastMsg">Done.</span></div>

<div class="modal" id="tableModal">
  <div class="modal-backdrop"></div>
  <div class="modal-content">
    <div class="modal-head">
      <h3 id="tableModalTitle">Add Table</h3>
      <button class="modal-close" id="tableModalClose">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group" id="tableModalNumberRow">
        <label>Table Number</label>
        <input type="number" id="tableModalNumber" class="form-input" min="1" />
      </div>
      <div class="form-group">
        <label>Name (optional)</label>
        <input type="text" id="tableModalName" class="form-input" placeholder="e.g., VIP Table" />
      </div>
      <div class="form-group">
        <label>Capacity (optional)</label>
        <input type="number" id="tableModalCapacity" class="form-input" min="1" placeholder="e.g., 4" />
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn-sm" id="tableModalCancel">Cancel</button>
      <button class="btn-sm gold" id="tableModalSave">Save</button>
    </div>
  </div>
</div>

<div class="modal" id="reserveModal">
  <div class="modal-backdrop"></div>
  <div class="modal-content">
    <div class="modal-head">
      <h3 id="reserveTableLabel">Reserve Table</h3>
      <button class="modal-close" id="reserveModalClose">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Guest Name</label>
        <input type="text" id="reserveGuestName" class="form-input" placeholder="Enter guest name" />
      </div>
      <div class="form-group">
        <label>Reservation Time</label>
        <div style="display:flex;gap:8px;align-items:center;">
          <select id="reserveHour" class="form-input" style="width:70px">
            ${[...Array(12)].map((_,i)=>`<option value="${i+1}">${i+1}</option>`).join('')}
          </select>
          <span>:</span>
          <select id="reserveMinute" class="form-input" style="width:70px">
            <option value="00">00</option>
            <option value="15">15</option>
            <option value="30">30</option>
            <option value="45">45</option>
          </select>
          <select id="reserveAmPm" class="form-input" style="width:80px">
            <option value="AM">AM</option>
            <option value="PM" selected>PM</option>
          </select>
        </div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn-sm" id="reserveModalCancel">Cancel</button>
      <button class="btn-sm gold" id="reserveModalConfirm">Confirm Reservation</button>
    </div>
  </div>
</div>

<script type="module" src="../admin-js/admin-tables.js"></script>

<script>document.addEventListener("DOMContentLoaded",()=>{ if(window.lucide) lucide.createIcons(); });</script>
</body>
</html>
