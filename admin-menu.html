<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Salo sa Antipolo — Menu</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,600;1,400;1,600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="admin.css"/>
</head>
<body>

<div class="bg"></div>
<div class="bg-dots"></div>
<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <div class="brand-icon">🍽️</div>
    <div class="brand-text">
      <span class="brand-name">Salo sa</span>
      <em class="brand-italic">Antipolo</em>
    </div>
  </div>

  <nav class="sidebar-nav">
    <div class="nav-section-label">Main</div>
    <a href="admin-overview.html" class="nav-item" data-view="overview">
      <span class="nav-icon">📊</span><span class="nav-label">Overview</span>
    </a>
    <a href="admin-orders.html" class="nav-item" data-view="orders">
      <span class="nav-icon">📋</span><span class="nav-label">Live Orders</span>
      <span class="nav-badge" id="ordersBadge">0</span>
    </a>
    <a href="admin-tables.html" class="nav-item" data-view="tables">
      <span class="nav-icon">🪑</span><span class="nav-label">Tables</span>
    </a>
    <a href="admin-menu.html" class="nav-item active" data-view="menu">
      <span class="nav-icon">🍴</span><span class="nav-label">Menu</span>
    </a>

    <div class="nav-section-label">Management</div>
    <a href="admin-billing.html" class="nav-item" data-view="billing">
      <span class="nav-icon">💰</span><span class="nav-label">Billing</span>
    </a>
    <a href="admin-staff.html" class="nav-item" data-view="staff">
      <span class="nav-icon">👥</span><span class="nav-label">Staff</span>
    </a>
    <a href="admin-reports.html" class="nav-item" data-view="reports">
      <span class="nav-icon">📈</span><span class="nav-label">Reports</span>
    </a>
  </nav>

  <div class="sidebar-user">
    <div class="user-avatar" id="userAvatarSidebar">A</div>
    <div class="user-info">
      <span class="user-name" id="userNameSidebar">Admin</span>
      <span class="user-role">Administrator</span>
    </div>
    <button class="logout-btn" id="logoutBtn" title="Logout">⏏</button>
  </div>
</aside>

<div class="overlay" id="overlay"></div>

<div class="main" id="main">
  <header class="topbar">
    <button class="hamburger" id="hamburger">☰</button>
    <div class="topbar-left">
      <h1 class="page-title" id="pageTitle">Menu</h1>
      <span class="page-date" id="pageDate"></span>
    </div>
    <div class="topbar-right">
      <div class="live-indicator"><span class="live-dot"></span>Live</div>
      <div class="topbar-user">
        <span id="topbarName">Admin</span>
        <div class="user-avatar sm" id="userAvatarTop">A</div>
      </div>
    </div>
  </header>

  <div class="view active">
    <div class="view-toolbar">
      <div class="filter-tabs" id="menuCategoryTabs">
        <button class="ftab active" data-cat="all">All</button>
      </div>
      <div class="toolbar-right">
        <button class="btn-sm gold" id="addMenuItemBtn">+ Add Item</button>
      </div>
    </div>
    <div class="menu-grid" id="menuGrid">
      <div class="empty-state">Loading menu…</div>
    </div>

    <div class="modal-overlay" id="menuModal">
      <div class="modal">
        <div class="modal-header">
          <span class="modal-title" id="menuModalTitle">Add Menu Item</span>
          <button class="modal-close" id="menuModalClose">✕</button>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label>Item Name</label>
            <input type="text" id="menuItemName" placeholder="e.g. Crispy Pata"/>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Price (₱)</label>
              <input type="number" id="menuItemPrice" placeholder="0.00"/>
            </div>
            <div class="form-group">
              <label>Category</label>
              <input type="text" id="menuItemCategory" placeholder="e.g. Main Course"/>
            </div>
          </div>
          <div class="form-group">
            <label>Description</label>
            <input type="text" id="menuItemDesc" placeholder="Short description…"/>
          </div>
          <div class="form-group">
            <label>Availability</label>
            <select id="menuItemAvail" aria-label="Availability">
              <option value="true">Available</option>
              <option value="false">Unavailable</option>
            </select>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn-sm" id="menuModalCancel">Cancel</button>
          <button class="btn-sm gold" id="menuModalSave">Save Item</button>
        </div>
      </div>
    </div>

    <div class="modal-overlay" id="orderModal">
      <div class="modal">
        <div class="modal-header">
          <span class="modal-title" id="orderModalTitle">Edit Order</span>
          <button class="modal-close" id="orderModalClose">✕</button>
        </div>
        <div class="modal-body" id="orderModalBody">
          <div class="empty-state">Loading order…</div>
        </div>
        <div class="modal-footer">
          <button class="btn-sm" id="orderModalCancel">Cancel</button>
          <button class="btn-sm gold" id="orderModalSave">Save Changes</button>
        </div>
      </div>
    </div>

    <div class="modal-overlay" id="receiptModal">
      <div class="modal">
        <div class="modal-header">
          <span class="modal-title">Receipt</span>
          <button class="modal-close" id="receiptModalClose">✕</button>
        </div>
        <div class="modal-body" id="receiptModalBody">
          <div class="empty-state">Loading receipt…</div>
        </div>
        <div class="modal-footer">
          <button class="btn-sm" id="receiptPrint">Print</button>
          <button class="btn-sm" id="receiptModalClose2">Close</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"><div class="toast-dot"></div><span id="toastMsg">Done.</span></div>

<script type="module" src="admin.js"></script>
</body>
</html>
